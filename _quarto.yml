project:
  type: book
  output-dir: _book
  resources:
    - code/**

book:
  title: "Effective Data Visualization in R"
  author: "OIT Research Technology Services"
  reader-mode: false
  cover-image: images/r_logo.png
  sidebar:
    logo: images/logo_stack.svg
    pinned: true
  page-footer:
    right: <a href="http://creativecommons.org/licenses/by-sa/4.0/"><img src="https://i.creativecommons.org/l/by-sa/4.0/88x31.png"></a>
  site-url: https://southernmethodistuniversity.github.io/data-viz-r
  repo-url: https://github.com/SouthernMethodistUniversity/data-viz-r
  repo-branch: main
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: "Foundations"
      chapters: 
        - why.qmd
        - theory.qmd
        - types.qmd
    - part: "Building in R"
      chapters:
        - method.qmd
        - ggplot.qmd
        - plotly.qmd
        - leaflet.qmd
    - next_steps.qmd

format:
  html:
    theme: cosmo
    code-link: true
    author-meta: "SMU OIT Research Technology Services"
    callout-appearance: simple

editor: source